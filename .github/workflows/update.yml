name: update-news
on:
  # 自动跑已关闭，只保留手动触发（Actions 页面点 Run workflow）
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run updater
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          python scripts/update_news.py --output-dir data --window-hours 168 \
            ${{ secrets.X_BEARER_TOKEN && '--enable-x' || '' }}
      - name: Commit refreshed data
        run: |
          git config user.name "hxz-news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore(data): refresh $(date -u +%FT%TZ)"
          git push
