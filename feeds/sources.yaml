# HXZ News Reader 信源台账
# 与飞书「内容工程-0609」对齐
# 字段说明：
#   id: 全局唯一短 ID
#   name: 显示名
#   type: rss | x_handle | wechat | podcast
#   url: RSS / 主页 URL（podcast / wechat 没有可用 RSS 时留空字符串）
#   category: ai_hot | business_innovation
#   group: 飞书表格的分组（X-国外/X-国内/公众号/聚合站/优质播客/商科信源）
